name: Bug Report
description: Report a bug in KASserver.NET
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Call '...'
        2. With parameters '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: kas-action
    attributes:
      label: KAS Action
      description: Which KAS action / library method is affected?
      placeholder: e.g. add_mailaccount / AddMailAccountAsync
    validations:
      required: false
  - type: dropdown
    id: dotnet-version
    attributes:
      label: .NET Version
      options:
        - net8.0
        - net9.0
        - net10.0
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package Version
      description: NuGet package version.
      placeholder: e.g. 1.0.0
    validations:
      required: true
