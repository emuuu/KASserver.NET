name: Create Release Tag
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer version (without v prefix, e.g. 1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Create as prerelease (-preview.N)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    env:
      PACKAGE: kasserver
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate SemVer
        run: |
          if ! echo "${{ inputs.version }}" | grep -Pq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'; then
            echo "::error::Invalid SemVer format: ${{ inputs.version }}. Expected MAJOR.MINOR.PATCH with no leading zeros."
            exit 1
          fi
      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            # Use (highest existing preview suffix + 1) so gaps don't cause a collision.
            HIGHEST=$(git tag -l "${PACKAGE}/v${{ inputs.version }}-preview.*" \
              | sed -E 's/.*-preview\.//' | grep -E '^[0-9]+$' | sort -n | tail -1)
            NEXT=$(( ${HIGHEST:--1} + 1 ))
            TAG_NAME="${PACKAGE}/v${{ inputs.version }}-preview.${NEXT}"
          else
            TAG_NAME="${PACKAGE}/v${{ inputs.version }}"
          fi
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_OUTPUT
      - name: Check tag does not exist
        run: |
          if git show-ref --verify --quiet "refs/tags/${{ steps.tag.outputs.TAG_NAME }}"; then
            echo "::error::Tag ${{ steps.tag.outputs.TAG_NAME }} already exists"
            exit 1
          fi
      - name: Verify CI passed on current HEAD
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_SHA=$(git rev-parse HEAD)
          RESULT=$(gh run list --branch main --workflow ci.yml --commit "$HEAD_SHA" --status success --limit 1 --json conclusion -q '.[0].conclusion')
          if [ "$RESULT" != "success" ]; then
            echo "::error::No successful CI run found for commit $HEAD_SHA. Please ensure CI passes before creating a release."
            exit 1
          fi
      # Stable releases promote the [Unreleased] changelog section into a dated [version] section and
      # commit it to main, so the tag points at the finalized changelog. Skipped for prereleases, which
      # must not consume the Unreleased entries. Fails if there is nothing under [Unreleased] to release.
      - name: Promote changelog
        if: ${{ inputs.prerelease == false }}
        run: |
          python3 .github/scripts/update_changelog.py \
            --version "${{ inputs.version }}" \
            --date "$(date -u +%Y-%m-%d)" \
            --repo "${{ github.repository }}" \
            --package "${PACKAGE}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update changelog for v${{ inputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}"
          echo "Promoted [Unreleased] -> [${{ inputs.version }}] and pushed to ${{ github.ref_name }}"
      - name: Create and push tag
        run: |
          git tag "${{ steps.tag.outputs.TAG_NAME }}"
          git push origin "${{ steps.tag.outputs.TAG_NAME }}"
          echo "Created and pushed tag: ${{ steps.tag.outputs.TAG_NAME }}"
      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run "release-client.yml" --ref "${{ steps.tag.outputs.TAG_NAME }}"
          echo "Triggered release-client.yml on ${{ steps.tag.outputs.TAG_NAME }}"
