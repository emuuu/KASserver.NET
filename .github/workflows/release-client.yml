name: Release Client
on:
  push:
    tags: ['kasserver/v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/release-package.yml
    with:
      package: kasserver
      csproj-path: KASserver.Client/KASserver.Client.csproj
      test-directory: tests/KASserver.Client.Tests
      title-prefix: KASserver.NET
    secrets:
      nuget-api-key: ${{ secrets.NUGET_API_KEY }}
