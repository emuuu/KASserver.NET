name: Release Package
on:
  workflow_call:
    inputs:
      package:
        description: 'Package identifier'
        required: true
        type: string
      csproj-path:
        description: 'Path to the .csproj file'
        required: true
        type: string
      test-directory:
        description: 'Path to the test project directory'
        required: true
        type: string
      title-prefix:
        description: 'Display name for GitHub Release title'
        required: true
        type: string
    secrets:
      nuget-api-key:
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Extract version from tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^${{ inputs.package }}/v ]]; then
            echo "::error::This workflow must be triggered by a tag matching '${{ inputs.package }}/v*', got: $GITHUB_REF_NAME"
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#${{ inputs.package }}/v}"
          if ! echo "$VERSION" | grep -Pq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-preview\.(0|[1-9][0-9]*))?$'; then
            echo "::error::Extracted version '$VERSION' is not a valid release version (MAJOR.MINOR.PATCH[-preview.N], no leading zeros)."
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - run: dotnet restore
      # Build with the tag version so the assemblies (AssemblyVersion/FileVersion/InformationalVersion)
      # carry it, not the static default from Directory.Build.props.
      - run: dotnet build -c Release --no-restore -p:Version=$VERSION
      - run: dotnet test -c Release --no-build
        working-directory: ${{ inputs.test-directory }}
      - name: Find previous release tag
        id: prev-tag
        run: |
          PREV_TAG=$(git tag -l "${{ inputs.package }}/v*" --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n 1)
          if [ -n "$PREV_TAG" ]; then
            echo "NOTES_START_TAG=--notes-start-tag $PREV_TAG" >> $GITHUB_OUTPUT
          else
            echo "NOTES_START_TAG=" >> $GITHUB_OUTPUT
          fi
      - name: Pack
        run: dotnet pack ${{ inputs.csproj-path }} -c Release --no-build -p:Version=$VERSION -o ./artifacts
      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg --skip-duplicate -s https://api.nuget.org/v3/index.json -k ${{ secrets.nuget-api-key }}
          if compgen -G "./artifacts/*.snupkg" > /dev/null; then
            dotnet nuget push ./artifacts/*.snupkg --skip-duplicate -s https://api.nuget.org/v3/index.json -k ${{ secrets.nuget-api-key }}
          fi
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *"-preview"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create ${{ github.ref_name }} ./artifacts/*.nupkg \
            --generate-notes ${{ steps.prev-tag.outputs.NOTES_START_TAG }} \
            $PRERELEASE_FLAG \
            --title "${{ inputs.title-prefix }} v$VERSION"
